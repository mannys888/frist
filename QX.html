<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CORS检测 - 央视API</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f0f2f5; }
        button { padding: 10px 20px; font-size: 16px; background: #0078d4; color: white; border: none; border-radius: 6px; cursor: pointer; }
        pre { background: #fff; padding: 12px; border-radius: 8px; overflow: auto; border: 1px solid #ddd; margin-top: 20px; }
    </style>
</head>
<body>
<h2>📡 央视 API 跨域测试</h2>
<p>点击下方按钮，测试浏览器是否可以直接请求央视栏目 API。</p>
<button id="testBtn">请求栏目数据</button>
<pre id="result">等待点击...</pre>

<script>
    document.getElementById('testBtn').onclick = async () => {
        const url = 'https://api.cntv.cn/lanmu/columnSearch?p=1&n=20&serviceId=tvcctv&t=json';
        const resultDiv = document.getElementById('result');
        resultDiv.innerText = '⏳ 请求中...';
        try {
            const resp = await fetch(url, {
                method: 'GET',
                mode: 'cors',
                credentials: 'omit',
                headers: {
                    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)',
                    'Referer': 'https://tv.cctv.com/',
                    'Origin': 'https://tv.cctv.com'
                }
            });
            if (resp.ok) {
                const json = await resp.json();
                resultDiv.innerText = '✅ 请求成功！\n\n' + JSON.stringify(json, null, 2);
            } else {
                resultDiv.innerText = `❌ HTTP ${resp.status}: ${resp.statusText}`;
            }
        } catch (err) {
            resultDiv.innerText = `❌ 请求失败 (CORS 或网络错误)\n\n错误信息: ${err.message}\n\n这通常是因为央视 API 服务器不允许跨域请求。浏览器无法直接调用，只能在 TVBox 等应用中正常使用。`;
        }
    };
</script>
</body>
</html>
